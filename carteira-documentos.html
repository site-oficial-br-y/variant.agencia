<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Carteira de Documentos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .phone {
      width: 390px;
      height: 780px;
      background: #ffffff;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
    }

    /* Top bar */
    .top-bar {
      background: #1a4b8c;
      color: white;
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 12px;
      flex-shrink: 0;
    }

    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
    }

    .top-bar h1 {
      font-size: 17px;
      font-weight: 600;
      flex: 1;
      text-align: center;
      margin-right: 34px;
    }

    /* Content area */
    .content {
      flex: 1;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      overflow-y: auto;
    }

    /* Document card */
    .doc-card {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      background: #ffffff;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .doc-card:hover {
      transform: translateY(-2px);
    }

    .card-header {
      background: linear-gradient(135deg, #5ecce8 0%, #4ab8d4 60%, #3aa0bc 100%);
      padding: 20px 18px 40px;
      position: relative;
      min-height: 120px;
      overflow: hidden;
    }

    /* Yellow triangle corner */
    .card-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 80px 80px 0 0;
      border-color: #f0c020 transparent transparent transparent;
    }

    /* ID badge */
    .id-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #1a4b8c;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      z-index: 2;
      letter-spacing: 0.5px;
    }

    .card-title {
      position: relative;
      z-index: 2;
      color: #1a3a6b;
      font-size: 15px;
      font-weight: 700;
      margin-left: 46px;
      margin-top: 6px;
    }

    /* Brazilian coat of arms watermark */
    .coat-of-arms {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.25;
      width: 90px;
      height: 90px;
    }

    .card-footer {
      background: #ffffff;
      padding: 14px 18px;
      font-size: 14px;
      color: #333;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* Add document button */
    .add-btn {
      margin-top: auto;
      margin-bottom: 12px;
      background: #2a7a2a;
      color: white;
      border: none;
      border-radius: 28px;
      padding: 16px 48px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(42,122,42,0.3);
    }

    .add-btn:hover {
      background: #226022;
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    /* Bottom nav */
    .bottom-nav {
      display: flex;
      background: #ffffff;
      border-top: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px 8px;
      gap: 3px;
      cursor: pointer;
      color: #888;
      font-size: 10px;
      font-weight: 500;
      transition: color 0.15s;
      position: relative;
    }

    .nav-item:hover {
      color: #1a4b8c;
    }

    .nav-item.active {
      color: #1a4b8c;
    }

    /* QR code nav item (center, elevated green circle) */
    .nav-item.qr {
      color: white;
    }

    .nav-item.qr .nav-icon-wrap {
      background: #2a7a2a;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -18px;
      box-shadow: 0 4px 12px rgba(42,122,42,0.4);
    }

    .nav-item.qr span {
      color: #555;
    }

    .nav-icon {
      font-size: 22px;
      line-height: 1;
    }

    /* SVG icons */
    .nav-svg {
      width: 22px;
      height: 22px;
    }

    /* Active indicator dot */
    .nav-item.active::after {
      content: '';
      position: absolute;
      bottom: 2px;
      width: 4px;
      height: 4px;
      background: #1a4b8c;
      border-radius: 50%;
    }
  </style>
</head>
<body>

<div class="phone">
  <!-- Top Bar -->
  <div class="top-bar">
    <button class="back-btn">&#8249;</button>
    <h1>Carteira de documentos</h1>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Identity Card -->
    <div class="doc-card">
      <div class="card-header">
        <div class="id-badge">ID</div>
        <div class="card-title">Carteira de Identidade</div>

        <!-- Brazilian Coat of Arms SVG watermark -->
        <svg class="coat-of-arms" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Simplified Brazilian emblem -->
          <circle cx="50" cy="50" r="44" fill="none" stroke="#1a4b8c" stroke-width="2.5"/>
          <circle cx="50" cy="50" r="36" fill="none" stroke="#1a4b8c" stroke-width="1.5"/>
          <circle cx="50" cy="50" r="22" fill="none" stroke="#1a4b8c" stroke-width="1.5"/>
          <!-- Star -->
          <polygon points="50,20 53,40 70,40 56,50 62,68 50,57 38,68 44,50 30,40 47,40"
                   fill="#1a4b8c" opacity="0.9"/>
          <!-- Laurel branches -->
          <path d="M15,55 Q20,45 28,50 Q22,60 15,55Z" fill="#1a4b8c"/>
          <path d="M12,65 Q18,55 26,60 Q20,70 12,65Z" fill="#1a4b8c"/>
          <path d="M14,75 Q21,66 28,72 Q22,80 14,75Z" fill="#1a4b8c"/>
          <path d="M85,55 Q80,45 72,50 Q78,60 85,55Z" fill="#1a4b8c"/>
          <path d="M88,65 Q82,55 74,60 Q80,70 88,65Z" fill="#1a4b8c"/>
          <path d="M86,75 Q79,66 72,72 Q78,80 86,75Z" fill="#1a4b8c"/>
          <!-- Banner -->
          <rect x="30" y="78" width="40" height="8" rx="2" fill="#1a4b8c" opacity="0.7"/>
          <text x="50" y="85" text-anchor="middle" font-size="4" fill="white" font-family="serif">BRASIL</text>
        </svg>
      </div>
      <div class="card-footer">CPF</div>
    </div>

    <!-- Add Document Button -->
    <button class="add-btn">Adicionar Documento</button>

  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <!-- Início -->
    <div class="nav-item">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <polyline points="9 21 9 12 15 12 15 21"/>
      </svg>
      <span>Início</span>
    </div>

    <!-- Dados -->
    <div class="nav-item">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2"/>
        <line x1="9" y1="7" x2="15" y2="7"/>
        <line x1="9" y1="11" x2="15" y2="11"/>
        <line x1="9" y1="15" x2="12" y2="15"/>
      </svg>
      <span>Dados</span>
    </div>

    <!-- QR Code (center) -->
    <div class="nav-item qr">
      <div class="nav-icon-wrap">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="3" height="3"/>
          <rect x="18" y="14" width="3" height="3"/>
          <rect x="14" y="18" width="3" height="3"/>
          <rect x="18" y="18" width="3" height="3"/>
        </svg>
      </div>
      <span>OR Code</span>
    </div>

    <!-- Carteira (active) -->
    <div class="nav-item active">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <path d="M16 12h.01"/>
        <path d="M2 10h20"/>
      </svg>
      <span>Carteira</span>
    </div>

    <!-- Menu -->
    <div class="nav-item">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span>Menu</span>
    </div>
  </div>
</div>

</body>
</html>
