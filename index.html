<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>gov.carteira</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .app {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      background: #fff;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 500px) {
      body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
      .app { height: 820px; border-radius: 36px; box-shadow: 0 24px 70px rgba(0,0,0,0.3); }
    }

    .screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
    .screen.active { display:flex; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .loading-spinner {
      width: 52px; height: 52px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a4b8c;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #444; font-weight: 500; letter-spacing: .3px; }
    .loading-dots::after { content: ''; animation: dots 1.4s steps(4, end) infinite; }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    .top-bar {
      background: #1a4b8c; color: #fff;
      display: flex; align-items: center;
      padding: 14px 16px; gap: 10px; flex-shrink: 0;
    }
    .top-bar .back { background:none; border:none; color:#fff; font-size:26px; cursor:pointer; line-height:1; padding:0 4px; }
    .top-bar h1 { flex:1; text-align:center; font-size:17px; font-weight:600; margin-right:30px; }

    .carteira-content {
      flex: 1; padding: 22px 18px;
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; overflow-y: auto;
    }

    .doc-card {
      width: 100%; border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.13);
      cursor: pointer; transition: transform .15s;
    }
    .doc-card:active { transform: scale(.97); }
    .card-header {
      background: linear-gradient(135deg, #5ecce8 0%, #4ab8d4 60%, #3aa0bc 100%);
      padding: 20px 16px 38px; position: relative; min-height: 118px; overflow: hidden;
    }
    .card-header::before {
      content:''; position:absolute; top:0; left:0;
      border-style:solid; border-width:76px 76px 0 0;
      border-color:#f0c020 transparent transparent transparent;
    }
    .id-badge {
      position:absolute; top:10px; left:10px;
      background:#1a4b8c; color:#fff;
      font-size:11px; font-weight:700;
      padding:2px 7px; border-radius:4px; z-index:2;
    }
    .card-title {
      position:relative; z-index:2;
      color:#1a3a6b; font-size:15px; font-weight:700;
      margin-left:44px; margin-top:6px;
    }
    .brasao-mini {
      position:absolute; right:10px; top:50%;
      transform:translateY(-50%);
      opacity:.22; width:88px; height:88px;
    }
    .card-footer { background:#fff; padding:13px 16px; font-size:14px; color:#333; font-weight:500; }

    .add-btn {
      margin-top: auto; margin-bottom: 10px;
      background: #2a7a2a; color: #fff; border: none;
      border-radius: 28px; padding: 15px 46px;
      font-size: 15px; font-weight:600; cursor: pointer;
      box-shadow: 0 4px 14px rgba(42,122,42,.3); transition: background .2s;
    }
    .add-btn:active { background:#1e5e1e; }

    .bottom-nav {
      display: flex; background: #fff;
      border-top: 1px solid #e2e2e2; flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction:column; align-items:center;
      padding: 9px 4px 7px; gap: 3px; cursor: pointer;
      color: #888; font-size: 10px; font-weight:500;
      transition: color .2s, transform .2s;
      position: relative; border-radius: 12px;
    }
    .nav-item:hover { color: #1a4b8c; transform: translateY(-3px); }
    .nav-item:hover .nav-svg { filter: drop-shadow(0 3px 6px rgba(26,75,140,0.3)); transform: scale(1.18); }
    .nav-item:active { transform: scale(.92); }
    .nav-item.active { color: #1a4b8c; }
    .nav-item.active::after {
      content:''; position:absolute; bottom:2px;
      width:4px; height:4px; background:#1a4b8c; border-radius:50%;
    }
    .nav-svg { width:22px; height:22px; transition: transform .2s, filter .2s; }
    .nav-item.qr .qr-circle {
      background:#2a7a2a; border-radius:50%;
      width:50px; height:50px;
      display:flex; align-items:center; justify-content:center;
      margin-top:-16px; box-shadow: 0 4px 14px rgba(42,122,42,.4);
      transition: transform .2s, box-shadow .2s;
    }
    .nav-item.qr:hover .qr-circle { transform: scale(1.12) translateY(-3px); box-shadow: 0 8px 20px rgba(42,122,42,.5); }
    .nav-item.qr span { color:#555; }

    .zoom-container { overflow: hidden; width: 100%; cursor: grab; touch-action: none; position: relative; }
    .zoom-container:active { cursor: grabbing; }
    #doc-img { transform-origin: 0 0; transition: transform .1s; user-select: none; -webkit-user-drag: none; }
    .zoom-btns { position: absolute; bottom: 12px; right: 12px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
    .zoom-btn {
      width: 36px; height: 36px; background: rgba(255,255,255,.9);
      border: 1px solid #ddd; border-radius: 50%; font-size: 20px; font-weight: 700;
      cursor: pointer; display: flex; align-items:center; justify-content:center;
      box-shadow: 0 2px 8px rgba(0,0,0,.15); transition: background .15s, transform .15s;
      color: #333; line-height: 1;
    }
    .zoom-btn:hover { background:#fff; transform:scale(1.1); }
    .zoom-btn:active { transform:scale(.95); }

    #screen-doc { background: #fff; }
    .doc-body { flex: 1; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 0; }
    .rg-wrapper { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; padding: 12px; }

    .doc-actions {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; padding: 10px 16px 4px; flex-shrink: 0;
    }
    .act-btn {
      background: #e8e8e8; border: none; border-radius: 16px;
      width: 54px; height: 54px; display: flex; align-items:center; justify-content:center;
      cursor: pointer; font-size: 20px; transition: background .15s;
    }
    .act-btn:active { background: #d0d0d0; }
    .dots-pagination { display: flex; gap: 7px; align-items:center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #1a4b8c; }
    .dot.inactive { background: #bbb; }
    .act-arrow { background: none; border: none; font-size: 22px; color: #333; cursor: pointer; padding: 8px; }
    .act-green {
      background: #2a7a2a; border: none; border-radius: 50%;
      width: 54px; height: 54px; display: flex; align-items:center; justify-content:center;
      cursor: pointer; box-shadow: 0 4px 12px rgba(42,122,42,.4);
    }
  </style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Carregando documento<span class="loading-dots"></span></div>
</div>

<div class="app">

  <div class="screen active" id="screen-carteira">
    <div class="top-bar">
      <button class="back">&#8249;</button>
      <h1>Carteira de documentos</h1>
    </div>
    <div class="carteira-content">
      <div class="doc-card" onclick="openDoc()">
        <div class="card-header">
          <div class="id-badge">ID</div>
          <div class="card-title">Carteira de Identidade</div>
          <svg class="brasao-mini" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="44" fill="none" stroke="#1a4b8c" stroke-width="2.5"/>
            <circle cx="50" cy="50" r="36" fill="none" stroke="#1a4b8c" stroke-width="1.5"/>
            <circle cx="50" cy="50" r="22" fill="none" stroke="#1a4b8c" stroke-width="1.5"/>
            <polygon points="50,20 53,40 70,40 56,50 62,68 50,57 38,68 44,50 30,40 47,40" fill="#1a4b8c" opacity=".9"/>
            <path d="M15,55 Q20,45 28,50 Q22,60 15,55Z" fill="#1a4b8c"/>
            <path d="M12,65 Q18,55 26,60 Q20,70 12,65Z" fill="#1a4b8c"/>
            <path d="M14,75 Q21,66 28,72 Q22,80 14,75Z" fill="#1a4b8c"/>
            <path d="M85,55 Q80,45 72,50 Q78,60 85,55Z" fill="#1a4b8c"/>
            <path d="M88,65 Q82,55 74,60 Q80,70 88,65Z" fill="#1a4b8c"/>
            <path d="M86,75 Q79,66 72,72 Q78,80 86,75Z" fill="#1a4b8c"/>
          </svg>
        </div>
        <div class="card-footer">CPF</div>
      </div>
      <button class="add-btn">Adicionar Documento</button>
    </div>
    <div class="bottom-nav">
      <div class="nav-item">
        <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>
        <span>In&#237;cio</span>
      </div>
      <div class="nav-item">
        <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="12" y2="15"/></svg>
        <span>Dados</span>
      </div>
      <div class="nav-item qr">
        <div class="qr-circle">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>
        </div>
        <span>QR Code</span>
      </div>
      <div class="nav-item active" onclick="openDoc()">
        <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 12h.01"/><path d="M2 10h20"/></svg>
        <span>Carteira</span>
      </div>
      <div class="nav-item">
        <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span>Menu</span>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-doc">
    <div style="background:#fff; height:14px; flex-shrink:0;"></div>
    <div class="doc-body" style="padding:0; background:#fff;">
      <div class="rg-wrapper" style="padding:0; align-items:flex-start; flex-direction:column;">
        <div class="zoom-container" id="zoom-wrap">
          <img id="doc-img" alt="Documento" style="width:100%; display:none; object-fit:contain;"/>
          <div class="zoom-btns">
            <button class="zoom-btn" onclick="zoomIn()">+</button>
            <button class="zoom-btn" onclick="zoomOut()">&#8722;</button>
          </div>
        </div>
        <div id="pick-wrap" style="width:100%; padding:30px 24px; display:flex; flex-direction:column; align-items:center; gap:14px;">
          <p style="font-size:14px; color:#555; text-align:center;">Selecione a imagem do seu documento</p>
          <label style="background:#2a7a2a; color:#fff; border-radius:24px; padding:14px 32px; font-size:15px; font-weight:600; cursor:pointer; box-shadow:0 4px 12px rgba(42,122,42,.3);">
            &#128206; Escolher imagem
            <input type="file" accept="image/*" style="display:none;" onchange="loadDoc(event)"/>
          </label>
        </div>
      </div>
    </div>
    <div class="doc-actions">
      <button class="act-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><circle cx="11" cy="11" r="3" stroke-dasharray="2 2"/></svg>
      </button>
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="dots-pagination">
          <div class="dot"></div><div class="dot inactive"></div><div class="dot inactive"></div><div class="dot inactive"></div>
        </div>
        <button class="act-arrow">&#8250;</button>
      </div>
      <button class="act-green">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="5" r="1.5" fill="white"/><circle cx="12" cy="12" r="1.5" fill="white"/><circle cx="12" cy="19" r="1.5" fill="white"/></svg>
      </button>
    </div>
    <div class="bottom-nav">
      <div class="nav-item" onclick="closeDoc()">
        <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>
        <span>In&#237;cio</span>
      </div>
      <div class="nav-item">
        <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="12" y2="15"/></svg>
        <span>Dados</span>
      </div>
      <div class="nav-item qr">
        <div class="qr-circle">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>
        </div>
        <span>QR Code</span>
      </div>
      <div class="nav-item active">
        <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 12h.01"/><path d="M2 10h20"/></svg>
        <span>Carteira</span>
      </div>
      <div class="nav-item">
        <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span>Menu</span>
      </div>
    </div>
  </div>

</div>

<script>
  function openDoc() {
    const loading = document.getElementById('loading');
    loading.classList.add('show');
    setTimeout(() => {
      loading.classList.remove('show');
      document.getElementById('screen-carteira').classList.remove('active');
      document.getElementById('screen-doc').classList.add('active');
    }, 1800);
  }
  function closeDoc() {
    document.getElementById('screen-doc').classList.remove('active');
    document.getElementById('screen-carteira').classList.add('active');
  }
  window.addEventListener('DOMContentLoaded', function() {
    const saved = localStorage.getItem('doc-foto');
    if (saved) {
      document.getElementById('doc-img').src = saved;
      document.getElementById('doc-img').style.display = 'block';
      document.getElementById('pick-wrap').style.display = 'none';
    }
  });
  function loadDoc(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById('doc-img');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('pick-wrap').style.display = 'none';
      localStorage.setItem('doc-foto', e.target.result);
    };
    reader.readAsDataURL(file);
  }
  let scale = 1, posX = 0, posY = 0, lastDist = 0, isDragging = false, startX = 0, startY = 0;
  function applyTransform() {
    document.getElementById('doc-img').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
  }
  function clampPos() {
    const img = document.getElementById('doc-img');
    const maxX = img.offsetWidth * (scale - 1);
    const maxY = img.offsetHeight * (scale - 1);
    posX = Math.min(0, Math.max(-maxX, posX));
    posY = Math.min(0, Math.max(-maxY, posY));
  }
  function zoomIn()  { scale = Math.min(4, scale + 0.4); clampPos(); applyTransform(); }
  function zoomOut() { scale = Math.max(1, scale - 0.4); if(scale===1){posX=0;posY=0;} clampPos(); applyTransform(); }
  const wrap = document.getElementById('zoom-wrap');
  wrap.addEventListener('mousedown', e => { isDragging=true; startX=e.clientX-posX; startY=e.clientY-posY; });
  window.addEventListener('mousemove', e => { if(!isDragging||scale<=1)return; posX=e.clientX-startX; posY=e.clientY-startY; clampPos(); applyTransform(); });
  window.addEventListener('mouseup', () => isDragging=false);
  wrap.addEventListener('wheel', e => { e.preventDefault(); scale=Math.min(4,Math.max(1,scale-e.deltaY*0.002)); if(scale===1){posX=0;posY=0;} clampPos(); applyTransform(); }, {passive:false});
  wrap.addEventListener('touchstart', e => {
    if(e.touches.length===2) lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    else if(e.touches.length===1){isDragging=true;startX=e.touches[0].clientX-posX;startY=e.touches[0].clientY-posY;}
  },{passive:true});
  wrap.addEventListener('touchmove', e => {
    if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);scale=Math.min(4,Math.max(1,scale*(d/lastDist)));lastDist=d;if(scale===1){posX=0;posY=0;}clampPos();applyTransform();}
    else if(e.touches.length===1&&isDragging&&scale>1){posX=e.touches[0].clientX-startX;posY=e.touches[0].clientY-startY;clampPos();applyTransform();}
  },{passive:false});
  wrap.addEventListener('touchend',()=>isDragging=false);
</script>
</body>
</html>
